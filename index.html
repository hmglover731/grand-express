<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>The Grand Express</title>
    <style>
        :root { 
            --brass: #d4a017; 
            --mahogany: #2c1e1a;
            --shadow: rgba(0,0,0,0.9);
        }

        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #000; font-family: 'Georgia', serif; }

        /* LAYER 1: BACKGROUND SCENERY */
        #main-background {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-size: cover; background-position: center;
            transition: background-image 2s ease-in-out; z-index: 1;
        }

        /* LAYER 2: DARK OVERLAY */
        .interior-wash {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4);
            z-index: 2; display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        /* NEW TOP DISPLAY: DATE & DESTINATION */
        .top-itinerary {
            z-index: 50;
            color: var(--brass);
            text-align: center;
            margin-bottom: 20px;
            text-shadow: 3px 3px 5px #000;
        }
        #current-date { font-size: 1.2rem; letter-spacing: 2px; margin-bottom: 5px; opacity: 0.9; }
        #station-display { font-size: 2.5rem; text-transform: uppercase; letter-spacing: 8px; font-weight: bold; }

        /* LAYER 3: THE MONITOR */
        .window-monitor {
            width: 80%; max-width: 900px; height: 480px;
            border: 18px solid var(--mahogany); 
            border-bottom: 30px solid #1a110f; 
            border-radius: 40px; background: #000;
            box-shadow: 0 50px 100px #000;
            overflow: hidden; position: relative; z-index: 10;
        }
        iframe { width: 100%; height: 100%; border: none; }

        /* LAYER 4: THE DASHBOARD (CONTROLS ONLY) */
        .dashboard { 
            margin-top: 30px; display: flex; gap: 40px; align-items: center; 
            background: #111; padding: 15px 50px; border-radius: 100px; 
            border: 2px solid var(--brass); 
            box-shadow: 0 0 20px rgba(212, 160, 23, 0.4);
            z-index: 100;
            position: relative;
        }
        
        button { 
            background: var(--brass); color: #000; border: 1px solid #000; 
            padding: 12px 30px; font-weight: bold; cursor: pointer; border-radius: 5px; 
            font-family: 'Georgia', serif; text-transform: uppercase; font-size: 0.9rem;
            transition: 0.3s;
        }
        button:hover { background: #fff; transform: scale(1.05); }

        /* LAYER 5: THE TRACKS (SLOWED DOWN) */
        .track-zone { 
            position: fixed; bottom: 0; left: 0; width: 100%; height: 60px; 
            background: #050505; border-top: 2px solid #333;
            overflow: hidden; z-index: 5;
        }
        .moving-rails { 
            width: 200%; height: 100%; 
            background: 
                repeating-linear-gradient(90deg, #221100 0px, #221100 20px, transparent 20px, transparent 120px),
                linear-gradient(0deg, transparent 25%, #444 25%, #444 28%, transparent 28%, transparent 72%, #444 72%, #444 75%, transparent 75%);
            animation: railwayBlur 4s linear infinite; /* Very slow leisurely pace */
        }
        @keyframes railwayBlur { from { transform: translateX(0); } to { transform: translateX(-120px); } }
    </style>
</head>
<body>

    <div id="main-background"></div>

    <div class="interior-wash">
        <div class="top-itinerary">
            <div id="current-date">-- -- ----</div>
            <div id="station-display">Connecting...</div>
        </div>
        
        <div class="window-monitor">
            <iframe id="smugmug-frame" src=""></iframe>
        </div>

        <div class="dashboard">
            <button onclick="navigate(-1)">PREVIOUS STATION</button>
            <button onclick="handleAudio()">🔊 SOUND ON/OFF</button>
            <button onclick="navigate(1)">NEXT STATION</button>
        </div>
    </div>

    <div class="track-zone"><div class="moving-rails"></div></div>

    <audio id="ambient-noise" loop>
        <source src="train_sound.mp3" type="audio/mpeg">
    </audio>

    <script>
        let route = [];
        let cursor = 0;
        const player = document.getElementById('ambient-noise');

        // Function to update the date at the top
        function updateDate() {
            const now = new Date();
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            document.getElementById('current-date').innerText = now.toLocaleDateString(undefined, options);
        }

        fetch('stations.json').then(r => r.json()).then(data => { 
            route = data; 
            updateDate();
            render(); 
        });

        function render() {
            if (!route.length) return;
            const current = route[cursor];
            document.getElementById('station-display').innerText = current.name;
            document.getElementById('main-background').style.backgroundImage = `url('${current.bg}')`;
            document.getElementById('smugmug-frame').src = `https://www.theglovers.com/frame/slideshow?key=${current.key}&autoStart=1&randomize=1&speed=5`;
        }

        function navigate(step) {
            cursor = (cursor + step + route.length) % route.length;
            render();
        }

        function handleAudio() {
            player.paused ? player.play() : player.pause();
        }

        // Keep the date updated if the page stays open
        setInterval(updateDate, 60000);
    </script>
</body>
</html>
