<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>The Grand Express</title>
    <style>
        /* THE LUXURY COLOR PALETTE */
        :root { 
            --brass: #d4a017; 
            --mahogany: #2c1e1a;
            --shadow: rgba(0,0,0,0.8);
        }

        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #000; font-family: 'Georgia', serif; }

        /* LAYER 1: THE DESTINATION POSTCARD */
        #main-background {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-size: cover; background-position: center;
            transition: background-image 2s ease-in-out; z-index: 1;
        }

        /* LAYER 2: THE TRAIN CAR INTERIOR */
        .interior-wash {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, rgba(0,0,0,0.2) 0%, rgba(0,0,0,0.7) 100%);
            z-index: 2; display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        /* LAYER 3: THE OBSERVATION WINDOW */
        .window-monitor {
            width: 80%; max-width: 900px; height: 500px;
            border: 18px solid var(--mahogany); 
            border-bottom: 35px solid #1a110f; /* The window sill */
            border-radius: 40px; background: #000;
            box-shadow: 0 50px 100px #000, inset 0 0 20px #000;
            overflow: hidden; position: relative;
        }
        iframe { width: 100%; height: 100%; border: none; }

        /* LAYER 4: THE TRACKS (VIRTUAL MOTION) */
        .track-zone { position: absolute; bottom: 0; width: 100%; height: 70px; background: #111; overflow: hidden; }
        .moving-rails { 
            width: 200%; height: 100%; 
            /* Draws the wooden ties (vertical) and steel rails (horizontal) */
            background: 
                repeating-linear-gradient(90deg, #332211 0px, #332211 15px, transparent 15px, transparent 90px),
                linear-gradient(0deg, transparent 25%, #777 25%, #777 28%, transparent 28%, transparent 72%, #777 72%, #777 75%, transparent 75%);
            animation: railwayBlur 0.4s linear infinite; 
        }
        @keyframes railwayBlur { from { transform: translateX(0); } to { transform: translateX(-90px); } }

        /* LAYER 5: THE CONTROL DASHBOARD */
        .dashboard { 
            margin-top: 40px; display: flex; gap: 30px; align-items: center; 
            background: var(--shadow); padding: 20px 50px; border-radius: 100px; 
            border: 2px solid var(--brass); box-shadow: 0 10px 30px #000;
        }
        #station-display { color: var(--brass); font-size: 1.8rem; text-transform: uppercase; letter-spacing: 5px; font-weight: bold; }
        button { 
            background: var(--brass); color: #000; border: 1px solid #000; 
            padding: 12px 25px; font-weight: bold; cursor: pointer; border-radius: 5px; 
            font-family: 'Georgia', serif; transition: 0.3s;
        }
        button:hover { background: #fff; transform: scale(1.05); }
    </style>
</head>
<body>

    <div id="main-background"></div>

    <div class="interior-wash">
        <h1 style="color: var(--brass); text-shadow: 3px 3px 5px #000; margin-bottom: 20px; letter-spacing: 10px;">THE GRAND EXPRESS</h1>
        
        <div class="window-monitor">
            <iframe id="smugmug-frame" src=""></iframe>
        </div>

        <div class="dashboard">
            <button onclick="navigate(-1)">PREVIOUS STATION</button>
            <div id="station-display">Connecting...</div>
            <button onclick="navigate(1)">NEXT STATION</button>
            <button onclick="handleAudio()">🔊 SOUND</button>
        </div>

        <div class="track-zone"><div class="moving-rails"></div></div>
    </div>

    <audio id="ambient-noise" loop>
        <source src="train_sound.mp3" type="audio/mpeg">
    </audio>

    <script>
        let route = [];
        let cursor = 0;
        const player = document.getElementById('ambient-noise');

        // Fetch the 50+ stations from your external JSON file
        fetch('stations.json').then(r => r.json()).then(data => { 
            route = data; 
            render(); 
        });

        function render() {
            if (!route.length) return;
            const current = route[cursor];
            document.getElementById('station-display').innerText = current.name;
            document.getElementById('main-background').style.backgroundImage = `url('${current.bg}')`;
            
            // Loading the SmugMug slideshow into the window
            document.getElementById('smugmug-frame').src = `https://www.theglovers.com/frame/slideshow?key=${current.key}&autoStart=1&randomize=1&speed=5`;
        }

        function navigate(step) {
            cursor = (cursor + step + route.length) % route.length;
            render();
        }

        function handleAudio() {
            player.paused ? player.play() : player.pause();
        }
    </script>
</body>
</html>
