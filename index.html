<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>The Grand Express</title>
    <style>
        :root { 
            /* New Sophisticated Palette */
            --brass: #c5a059; 
            --charcoal: #121212; 
            --deep-panel: #1a1a1a;
            --wine: #4a0e0e; /* Much darker, muted red */
        }
        
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background: #000; font-family: 'Georgia', serif; }

        /* THE ROOM INTERIOR (Replacing the brown) */
        .cabin-interior {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 10; pointer-events: none;
            /* Using a metallic/charcoal gradient instead of brown */
            background: radial-gradient(circle at 50% 45%, transparent 35%, rgba(0,0,0,0.9) 95%),
                        linear-gradient(135deg, var(--deep-panel) 0%, #000 100%);
            clip-path: polygon(0% 0%, 100% 0%, 100% 100%, 0% 100%, 0% 0%, 12% 20%, 12% 70%, 88% 70%, 88% 20%, 12% 20%);
        }

        /* THE PHOTO WINDOW */
        .window-glass {
            position: absolute; top: 20%; left: 12%; width: 76%; height: 50%;
            z-index: 5; background: #000;
            border: 8px solid #0a0a0a;
            outline: 1px solid var(--brass);
            box-shadow: 0 0 120px rgba(0,0,0,1);
        }
        iframe { width: 100%; height: 100%; border: none; display: block; }

        /* THE MUTED CURTAINS (Softened and Darkened) */
        .curtain {
            position: fixed; top: 0; height: 75vh; width: 15vw; z-index: 15;
            background: linear-gradient(90deg, #1a0505 0%, var(--wine) 50%, #1a0505 100%);
            border-bottom: 3px solid var(--brass);
            opacity: 0.9;
        }
        .curtain-l { left: 0; border-right: 1px solid rgba(197, 160, 89, 0.3); border-radius: 0 0 60px 0; }
        .curtain-r { right: 0; border-left: 1px solid rgba(197, 160, 89, 0.3); border-radius: 0 0 0 60px; }

        /* ELEGANT TYPOGRAPHY */
        .header {
            position: fixed; top: 5vh; width: 100%; text-align: center;
            color: var(--brass); text-shadow: 0 0 30px #000; z-index: 20;
        }
        #station-display { font-size: 4rem; margin: 0; letter-spacing: 15px; text-transform: uppercase; font-weight: normal; font-style: italic; }
        #date-display { font-size: 1.2rem; color: #888; letter-spacing: 6px; margin-top: 10px; text-transform: uppercase; }

        /* THE FOOTER CONSOLE */
        .footer {
            position: fixed; bottom: 0; width: 100%; height: 25%;
            background: #080808; border-top: 2px solid #1a1a1a;
            z-index: 20; display: flex; align-items: center; justify-content: center;
        }
        button { 
            background: none; color: var(--brass); border: 1px solid var(--brass); 
            padding: 14px 40px; font-weight: bold; cursor: pointer; border-radius: 2px; 
            font-family: 'Georgia', serif; text-transform: uppercase; letter-spacing: 3px;
            transition: 0.4s;
        }
        button:hover { background: var(--brass); color: #000; box-shadow: 0 0 20px rgba(197, 160, 89, 0.4); }
    </style>
</head>
<body>

    <div class="cabin-interior"></div>
    
    <div class="window-glass">
        <iframe id="smugmug-frame" src=""></iframe>
    </div>

    <div class="curtain curtain-l"></div>
    <div class="curtain curtain-r"></div>

    <div class="header">
        <h1 id="station-display">Loading...</h1>
        <div id="date-display">Passenger Manifest</div>
    </div>

    <div class="footer">
        <button onclick="navigate(-1)">Prev</button>
        <button style="margin: 0 30px;" onclick="handleAudio()">Ambient Audio</button>
        <button onclick="navigate(1)">Next</button>
    </div>

    <audio id="ambient-noise" loop>
        <source src="train_sound.mp3" type="audio/mpeg">
    </audio>

    <script>
        let route = [];
        let cursor = 0;
        let timer;
        const player = document.getElementById('ambient-noise');

        fetch('stations.json?v=' + Date.now())
            .then(r => r.json())
            .then(data => { 
                route = data; 
                render(); 
                startTimer();
            });

        function render() {
            if (!route.length) return;
            const s = route[cursor];
            document.getElementById('station-display').innerText = s.name;
            document.getElementById('date-display').innerText = s.date;
            document.getElementById('smugmug-frame').src = `https://www.theglovers.com/frame/slideshow?key=${s.key}&autoStart=1&randomize=1&speed=5`;
        }

        function startTimer() {
            if (timer) clearInterval(timer);
            timer = setInterval(() => navigate(1), 30000);
        }

        function navigate(n) {
            cursor = (cursor + n + route.length) % route.length;
            render();
            startTimer();
        }

        function handleAudio() {
            player.paused ? player.play() : player.pause();
        }
    </script>
</body>
</html>
