<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Grand Express</title>
    <style>
        :root { --brass: #d4a017; --wood: #3d251e; }
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #000; font-family: 'Georgia', serif; }

        /* Full Page Background */
        #main-background {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-size: cover; background-position: center;
            transition: background-image 1.5s ease-in-out; z-index: 1;
        }

        /* Train Interior Overlay */
        .interior-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.3); z-index: 2;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        /* The Viewport Monitor */
        .monitor-frame {
            width: 75%; max-width: 850px; height: 480px;
            border: 12px solid #2c1e1a; border-bottom: 25px solid #1a110f;
            border-radius: 25px; background: #000;
            box-shadow: 0 30px 60px rgba(0,0,0,0.9); overflow: hidden;
        }
        iframe { width: 100%; height: 100%; border: none; }

        /* Dashboard */
        .dashboard {
            margin-top: 30px; background: rgba(20, 20, 20, 0.9);
            padding: 15px 40px; border-radius: 50px;
            border: 2px solid var(--brass); display: flex; gap: 25px; align-items: center;
        }
        #station-name { color: var(--brass); font-size: 1.6rem; text-transform: uppercase; letter-spacing: 3px; min-width: 280px; }
        button { background: var(--brass); color: #000; border: none; padding: 12px 24px; font-weight: bold; cursor: pointer; border-radius: 5px; transition: 0.2s; }
        button:hover { background: #fff; }

        /* Moving Tracks */
        .track-system { position: absolute; bottom: 0; width: 100%; height: 60px; background: rgba(0,0,0,0.7); overflow: hidden; }
        .rails { 
            width: 200%; height: 100%; 
            background: repeating-linear-gradient(90deg, #333 0px, #333 10px, transparent 10px, transparent 70px);
            animation: railMotion 0.6s linear infinite; 
        }
        @keyframes railMotion { from { transform: translateX(0); } to { transform: translateX(-70px); } }
    </style>
</head>
<body>

    <div id="main-background"></div>

    <div class="interior-overlay">
        <h1 style="color: var(--brass); text-shadow: 2px 2px #000; margin-bottom: 10px;">THE GRAND EXPRESS</h1>
        
        <div class="monitor-frame">
            <iframe id="itinerary-window" src=""></iframe>
        </div>

        <div class="dashboard">
            <button onclick="changeStation(-1)">PREVIOUS</button>
            <div id="station-name">Loading...</div>
            <button onclick="changeStation(1)">NEXT</button>
            <button onclick="toggleAudio()">🔊 SOUND</button>
        </div>

        <div class="track-system"><div class="rails"></div></div>
    </div>

    <audio id="train-audio" loop>
        <source src="train_sound.mp3" type="audio/mpeg">
    </audio>

    <script>
        let stations = [];
        let index = 0;
        const audio = document.getElementById('train-audio');

        fetch('stations.json')
            .then(res => res.json())
            .then(data => { stations = data; update(); });

        function update() {
            if (!stations.length) return;
            const s = stations[index];
            document.getElementById('station-name').innerText = s.name;
            document.getElementById('main-background').style.backgroundImage = `url('${s.bg}')`;
            document.getElementById('itinerary-window').src = `https://www.theglovers.com/frame/slideshow?key=${s.key}&autoStart=1&randomize=1&speed=4`;
        }

        function changeStation(dir) {
            index = (index + dir + stations.length) % stations.length;
            update();
        }

        function toggleAudio() {
            audio.paused ? audio.play() : audio.pause();
        }
    </script>
</body>
</html>
