<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>The Grand Express</title>
    <style>
        :root { 
            --brass: #d4a017; 
            --mahogany: #3d251e; 
            --curtain: #800000; /* Deep Red */
        }
        
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background: #000; font-family: 'Georgia', serif; }

        /* LAYER 1: THE SCENERY (The furthest back layer) */
        #main-background {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background-size: cover; background-position: center;
            transition: background-image 3s ease-in-out; z-index: 1;
        }

        /* LAYER 2: THE SMUGMUG WINDOW (Sits on top of scenery) */
        .window-pane {
            position: absolute; top: 22vh; left: 15vw; width: 70vw; height: 50vh;
            z-index: 2; background: #000; border: 10px solid #1a110f;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
        }
        iframe { width: 100%; height: 100%; border: none; }

        /* LAYER 3: THE CABIN INTERIOR (Curtains and Mahogany) */
        .cabin-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 10;
            /* Draws the Mahogany Walls */
            border-left: 12vw solid var(--mahogany);
            border-right: 12vw solid var(--mahogany);
            border-top: 18vh solid var(--mahogany);
            border-bottom: 25vh solid #1a110f;
            box-sizing: border-box;
        }

        /* THE CURTAINS */
        .curtain-left, .curtain-right {
            position: fixed; top: 15vh; width: 10vw; height: 65vh;
            background: var(--curtain); z-index: 11;
            border-left: 5px solid #600; border-right: 5px solid #d4a017;
            box-shadow: 10px 0 20px rgba(0,0,0,0.5);
        }
        .curtain-left { left: 10vw; border-radius: 0 50px 50px 0; }
        .curtain-right { right: 10vw; border-radius: 50px 0 0 50px; }

        /* HEADER & DATE */
        .info-panel {
            position: fixed; top: 4vh; width: 100%; text-align: center;
            color: var(--brass); text-shadow: 2px 2px 10px #000; z-index: 20;
        }
        #station-display { font-size: 3rem; margin: 0; letter-spacing: 8px; text-transform: uppercase; }
        #date-display { font-size: 1.4rem; opacity: 0.9; margin-top: 5px; }

        /* DASHBOARD */
        .controls { 
            position: fixed; bottom: 8vh; left: 50%;
            transform: translateX(-50%);
            display: flex; gap: 30px; z-index: 30; 
        }
        button { 
            background: var(--brass); color: #000; border: 2px solid #000; 
            padding: 15px 35px; font-weight: bold; cursor: pointer; border-radius: 5px; 
            font-family: 'Georgia', serif; text-transform: uppercase;
        }
        button:hover { background: #fff; pointer-events: auto; }
    </style>
</head>
<body>

    <div id="main-background"></div>
    
    <div class="window-pane">
        <iframe id="smugmug-frame" src=""></iframe>
    </div>

    <div class="cabin-overlay"></div>
    <div class="curtain-left"></div>
    <div class="curtain-right"></div>

    <div class="info-panel">
        <h1 id="station-display">BOARDING...</h1>
        <div id="date-display">LOADING MANIFEST</div>
    </div>

    <div class="controls">
        <button onclick="navigate(-1)">PREVIOUS</button>
        <button onclick="handleAudio()">🔊 SOUND</button>
        <button onclick="navigate(1)">NEXT</button>
    </div>

    <audio id="ambient-noise" loop>
        <source src="train_sound.mp3" type="audio/mpeg">
    </audio>

    <script>
        let route = [];
        let cursor = 0;
        let trainTimer;
        const player = document.getElementById('ambient-noise');

        fetch('stations.json?v=' + Date.now())
            .then(r => r.json())
            .then(data => { 
                route = data; 
                render(); 
                startTimer();
            });

        function render() {
            if (!route.length) return;
            const s = route[cursor];
            document.getElementById('station-display').innerText = s.name;
            document.getElementById('date-display').innerText = s.date;
            
            // Background Scenery
            document.getElementById('main-background').style.backgroundImage = `url('${s.bg}')`;
            
            // SmugMug Window
            document.getElementById('smugmug-frame').src = `https://www.theglovers.com/frame/slideshow?key=${s.key}&autoStart=1&randomize=1&speed=5`;
        }

        function startTimer() {
            if (trainTimer) clearInterval(trainTimer);
            trainTimer = setInterval(() => navigate(1), 30000);
        }

        function navigate(n) {
            cursor = (cursor + n + route.length) % route.length;
            render();
            startTimer();
        }

        function handleAudio() {
            player.paused ? player.play() : player.pause();
        }
    </script>
</body>
</html>
