<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>The Grand Express</title>
    <style>
        :root { 
            --brass: #d4a017; 
            --mahogany: #2c1e1a;
            --overlay: rgba(0,0,0,0.5);
        }

        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #000; font-family: 'Georgia', serif; }

        /* LAYER 1: THE FULL-SCREEN POSTCARD */
        #main-background {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-size: cover; background-position: center;
            transition: background-image 2s ease-in-out; z-index: 1;
        }

        /* LAYER 2: THE MAIN INTERFACE CONTAINER */
        .ui-wrapper {
            position: relative; z-index: 10;
            height: 100vh; width: 100vw;
            display: flex; flex-direction: column;
            justify-content: space-between; /* Pushes Top to top and Bottom to bottom */
            align-items: center;
            background: var(--overlay);
            padding: 40px 0;
            box-sizing: border-box;
        }

        /* TOP SECTION: DATE & DESTINATION */
        .header-display { text-align: center; color: var(--brass); text-shadow: 3px 3px 6px #000; }
        #current-date { font-size: 1.2rem; letter-spacing: 2px; margin-bottom: 5px; text-transform: uppercase; }
        #station-display { font-size: 3rem; font-weight: bold; letter-spacing: 10px; text-transform: uppercase; }

        /* MIDDLE SECTION: THE WINDOW */
        .window-monitor {
            width: 85%; max-width: 950px; height: 500px;
            border: 20px solid var(--mahogany); 
            border-bottom: 35px solid #1a110f; 
            border-radius: 45px; background: #000;
            box-shadow: 0 40px 80px #000;
            overflow: hidden;
        }
        iframe { width: 100%; height: 100%; border: none; }

        /* BOTTOM SECTION: CONTROLS */
        .button-deck { 
            display: flex; gap: 40px; align-items: center; 
            background: #111; padding: 15px 50px; border-radius: 100px; 
            border: 2px solid var(--brass); 
            box-shadow: 0 0 30px rgba(0,0,0,1);
        }
        button { 
            background: var(--brass); color: #000; border: 1px solid #000; 
            padding: 12px 30px; font-weight: bold; cursor: pointer; border-radius: 5px; 
            font-family: 'Georgia', serif; text-transform: uppercase; font-size: 0.9rem;
        }
        button:hover { background: #fff; }

        /* LAYER 3: THE TRACKS (AT THE VERY BOTTOM) */
        .track-basement { 
            position: fixed; bottom: 0; left: 0; width: 100%; height: 50px; 
            background: #080808; border-top: 2px solid #222;
            overflow: hidden; z-index: 5; /* Behind the buttons, but visible at the bottom */
        }
        .rail-animation { 
            width: 200%; height: 100%; 
            background: 
                repeating-linear-gradient(90deg, #221100 0px, #221100 20px, transparent 20px, transparent 150px),
                linear-gradient(0deg, transparent 30%, #444 30%, #444 33%, transparent 33%, transparent 67%, #444 67%, #444 70%, transparent 70%);
            animation: slowRoll 5s linear infinite; 
        }
        @keyframes slowRoll { from { transform: translateX(0); } to { transform: translateX(-150px); } }
    </style>
</head>
<body>

    <div id="main-background"></div>

    <div class="ui-wrapper">
        <div class="header-display">
            <div id="current-date">Sunday, April 5, 2026</div>
            <div id="station-display">Connecting...</div>
        </div>
        
        <div class="window-monitor">
            <iframe id="smugmug-frame" src=""></iframe>
        </div>

        <div class="button-deck">
            <button onclick="navigate(-1)">PREVIOUS</button>
            <button onclick="handleAudio()">🔊 SOUND ON/OFF</button>
            <button onclick="navigate(1)">NEXT</button>
        </div>
    </div>

    <div class="track-basement"><div class="rail-animation"></div></div>

    <audio id="ambient-noise" loop>
        <source src="train_sound.mp3" type="audio/mpeg">
    </audio>

    <script>
        let route = [];
        let cursor = 0;
        const player = document.getElementById('ambient-noise');

        // Force the date update immediately
        function updateDate() {
            const now = new Date();
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            document.getElementById('current-date').innerText = now.toLocaleDateString(undefined, options);
        }

        fetch('stations.json').then(r => r.json()).then(data => { 
            route = data; 
            updateDate();
            render(); 
        });

        function render() {
            if (!route.length) return;
            const current = route[cursor];
            document.getElementById('station-display').innerText = current.name;
            document.getElementById('main-background').style.backgroundImage = `url('${current.bg}')`;
            document.getElementById('smugmug-frame').src = `https://www.theglovers.com/frame/slideshow?key=${current.key}&autoStart=1&randomize=1&speed=5`;
        }

        function navigate(step) {
            cursor = (cursor + step + route.length) % route.length;
            render();
        }

        function handleAudio() {
            player.paused ? player.play() : player.pause();
        }

        setInterval(updateDate, 60000);
    </script>
</body>
</html>
