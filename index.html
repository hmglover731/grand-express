<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>The Grand Express</title>
    <style>
        :root { 
            --brass: #d4a017; 
            --mahogany: #2c1e1a;
        }

        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #000; font-family: 'Georgia', serif; }

        /* LAYER 1: THE BACKGROUND */
        #main-background {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-size: cover; background-position: center;
            transition: background-image 2s ease-in-out; z-index: 1;
        }

        /* LAYER 2: DARK TINT */
        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4); z-index: 2;
        }

        /* TOP SECTION: DESTINATION & DATE */
        .header {
            position: fixed; top: 40px; width: 100%; text-align: center;
            color: var(--brass); text-shadow: 3px 3px 6px #000; z-index: 10;
        }
        #station-display { font-size: 3.5rem; font-weight: bold; letter-spacing: 10px; text-transform: uppercase; margin: 0; }
        #date-display { font-size: 1.4rem; letter-spacing: 3px; text-transform: uppercase; margin-top: 5px; opacity: 0.9; }

        /* MIDDLE SECTION: THE WINDOW */
        .window-container {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -45%); /* Centers the window */
            width: 80%; max-width: 900px; height: 450px;
            border: 18px solid var(--mahogany); 
            border-bottom: 30px solid #1a110f; 
            border-radius: 40px; background: #000;
            box-shadow: 0 50px 100px #000;
            overflow: hidden; z-index: 5;
        }
        iframe { width: 100%; height: 100%; border: none; }

        /* BOTTOM SECTION: PINNED BUTTONS */
        .footer-controls { 
            position: fixed; bottom: 80px; left: 50%;
            transform: translateX(-50%);
            display: flex; gap: 30px; align-items: center; 
            background: #111; padding: 15px 40px; border-radius: 100px; 
            border: 2px solid var(--brass); 
            box-shadow: 0 0 30px rgba(0,0,0,1);
            z-index: 100; /* Forces buttons to the very front */
        }
        button { 
            background: var(--brass); color: #000; border: 1px solid #000; 
            padding: 12px 25px; font-weight: bold; cursor: pointer; border-radius: 5px; 
            font-family: 'Georgia', serif; text-transform: uppercase;
        }
        button:hover { background: #fff; }

        /* TRACKS: AT THE VERY BOTTOM */
        .tracks { 
            position: fixed; bottom: 0; left: 0; width: 100%; height: 50px; 
            background: #080808; border-top: 2px solid #222;
            overflow: hidden; z-index: 1;
        }
        .rail-move { 
            width: 200%; height: 100%; 
            background: 
                repeating-linear-gradient(90deg, #221100 0px, #221100 20px, transparent 20px, transparent 150px),
                linear-gradient(0deg, transparent 30%, #444 30%, #444 33%, transparent 33%, transparent 67%, #444 67%, #444 70%, transparent 70%);
            animation: move 6s linear infinite; 
        }
        @keyframes move { from { transform: translateX(0); } to { transform: translateX(-150px); } }
    </style>
</head>
<body>

    <div id="main-background"></div>
    <div class="overlay"></div>

    <div class="header">
        <h1 id="station-display">Connecting...</h1>
        <div id="date-display">Please Wait</div>
    </div>
    
    <div class="window-container">
        <iframe id="smugmug-frame" src=""></iframe>
    </div>

    <div class="footer-controls">
        <button onclick="navigate(-1)">PREVIOUS</button>
        <button onclick="handleAudio()">🔊 SOUND</button>
        <button onclick="navigate(1)">NEXT</button>
    </div>

    <div class="tracks"><div class="rail-move"></div></div>

    <audio id="ambient-noise" loop>
        <source src="train_sound.mp3" type="audio/mpeg">
    </audio>

    <script>
        let route = [];
        let cursor = 0;
        const player = document.getElementById('ambient-noise');

        fetch('stations.json').then(r => r.json()).then(data => { 
            route = data; 
            render(); 
        });

        function render() {
            if (!route.length) return;
            const current = route[cursor];
            
            // Updates from JSON data
            document.getElementById('station-display').innerText = current.name;
            document.getElementById('date-display').innerText = current.date;
            document.getElementById('main-background').style.backgroundImage = `url('${current.bg}')`;
            
            // SmugMug Window
            document.getElementById('smugmug-frame').src = `https://www.theglovers.com/frame/slideshow?key=${current.key}&autoStart=1&randomize=1&speed=5`;
        }

        function navigate(step) {
            cursor = (cursor + step + route.length) % route.length;
            render();
        }

        function handleAudio() {
            player.paused ? player.play() : player.pause();
        }
    </script>
</body>
</html>
