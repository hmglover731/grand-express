<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>The Grand Express</title>
    <style>
        :root { 
            --brass: #d4a017; 
            --mahogany: #1a0f0d; 
            --panel: #2a1814;
            --velvet: #660000;
        }
        
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background: #000; font-family: 'Georgia', serif; }

        /* THE SCENERY (Must be .jpg to work!) */
        #scenery {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background-size: cover; background-position: center;
            transition: background-image 3s ease-in-out; z-index: 1;
        }

        /* THE WINDOW HOLE */
        .window-gap {
            position: absolute; top: 18%; left: 10%; width: 80%; height: 50%;
            z-index: 5; background: #000;
            border: 10px solid var(--mahogany);
            outline: 2px solid var(--brass);
            box-shadow: 0 0 80px #000;
            border-radius: 4px; overflow: hidden;
        }
        iframe { width: 100%; height: 100%; border: none; }

        /* THE LUXURY WALLS */
        .walls {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 10; pointer-events: none;
            background: radial-gradient(circle at 50% 40%, transparent 20%, rgba(0,0,0,0.9) 85%),
                        linear-gradient(to bottom, var(--panel), #000);
        }

        /* PLEATED VELVET CURTAINS */
        .curtain {
            position: fixed; top: 0; height: 70vh; width: 12vw; z-index: 15;
            /* This gradient creates the 'fold' look */
            background: linear-gradient(90deg, #400 0%, #800 20%, #400 40%, #800 60%, #400 80%, #800 100%);
            border-bottom: 5px solid var(--brass);
            box-shadow: 10px 0 30px rgba(0,0,0,0.8);
        }
        .curtain-l { left: 0; border-right: 2px solid var(--brass); }
        .curtain-r { right: 0; border-left: 2px solid var(--brass); }

        /* HEADER AREA */
        .top-label {
            position: fixed; top: 30px; width: 100%; text-align: center;
            color: var(--brass); text-shadow: 2px 2px 15px #000; z-index: 25;
        }
        #station-display { font-size: 3.5rem; margin: 0; letter-spacing: 10px; text-transform: uppercase; }
        #date-display { font-size: 1.3rem; color: #fff; opacity: 0.8; letter-spacing: 4px; margin-top: 5px; }

        /* THE CONTROL CONSOLE */
        .console {
            position: fixed; bottom: 0; width: 100%; height: 28%;
            background: linear-gradient(to bottom, #1a0f0d, #000);
            border-top: 5px solid var(--mahogany);
            z-index: 20; display: flex; align-items: center; justify-content: center;
        }
        button { 
            background: linear-gradient(180deg, #d4a017 0%, #8a680e 100%);
            color: #1a0f0d; border: 1px solid #000; 
            padding: 18px 45px; font-weight: bold; cursor: pointer; border-radius: 4px; 
            font-family: 'Georgia', serif; text-transform: uppercase; font-size: 1.1rem;
            box-shadow: 0 5px 0 #5e460a, 0 10px 25px rgba(0,0,0,0.7);
            margin: 0 15px; transition: 0.1s;
        }
        button:active { transform: translateY(4px); box-shadow: 0 1px 0 #5e460a; }
    </style>
</head>
<body>

    <div id="scenery"></div>
    <div class="walls"></div>
    
    <div class="window-gap">
        <iframe id="smugmug-frame" src=""></iframe>
    </div>

    <div class="curtain curtain-l"></div>
    <div class="curtain curtain-r"></div>

    <div class="top-label">
        <h1 id="station-display">Connecting...</h1>
        <div id="date-display">Checking Manifest</div>
    </div>

    <div class="console">
        <button onclick="navigate(-1)">PREVIOUS</button>
        <button onclick="handleAudio()">🔊 SOUND</button>
        <button onclick="navigate(1)">NEXT</button>
    </div>

    <audio id="ambient-noise" loop>
        <source src="train_sound.mp3" type="audio/mpeg">
    </audio>

    <script>
        let route = [];
        let cursor = 0;
        let timer;
        const player = document.getElementById('ambient-noise');

        // Added a completely unique ID to the fetch to kill the cache
        fetch('stations.json?nocache=' + Math.random())
            .then(r => r.json())
            .then(data => { 
                route = data; 
                render(); 
                startTimer();
            });

        function render() {
            if (!route.length) return;
            const s = route[cursor];
            document.getElementById('station-display').innerText = s.name;
            document.getElementById('date-display').innerText = s.date;
            
            // Background update
            const bg = document.getElementById('scenery');
            bg.style.backgroundImage = "url('" + s.bg + "')";
            
            // Iframe update
            document.getElementById('smugmug-frame').src = "https://www.theglovers.com/frame/slideshow?key=" + s.key + "&autoStart=1&randomize=1&speed=5";
        }

        function startTimer() {
            if (timer) clearInterval(timer);
            timer = setInterval(() => navigate(1), 30000);
        }

        function navigate(n) {
            cursor = (cursor + n + route.length) % route.length;
            render();
            startTimer();
        }

        function handleAudio() {
            player.paused ? player.play() : player.pause();
        }
    </script>
</body>
</html>
