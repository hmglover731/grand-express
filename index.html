<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>The Grand Express</title>
    <style>
        :root { 
            --brass: #d4a017; 
            --mahogany: #2c1e1a;
            --steel: #777;
        }

        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #000; font-family: 'Georgia', serif; }

        /* LAYER 1: THE DESTINATION PHOTO */
        #main-background {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-size: cover; background-position: center;
            transition: background-image 2s ease-in-out; z-index: 1;
        }

        /* LAYER 2: THE TRAIN CAR STRUCTURE */
        .train-car-frame {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            border-left: 10vw solid var(--mahogany);
            border-right: 10vw solid var(--mahogany);
            border-top: 15vh solid var(--mahogany);
            border-bottom: 25vh solid #1a110f;
            box-sizing: border-box;
            z-index: 5;
            pointer-events: none; /* Allows you to click through the 'walls' if needed */
            box-shadow: inset 0 0 100px #000;
        }

        /* LAYER 3: THE WINDOW (SMUGMUG) */
        .window-viewport {
            position: absolute; 
            top: 15vh; left: 10vw; 
            width: 80vw; height: 60vh;
            background: #000;
            z-index: 2;
            overflow: hidden;
            border: 5px solid #111;
        }
        iframe { width: 100%; height: 100%; border: none; }

        /* HEADER: NAME & DATE (STAY AT TOP) */
        .itinerary-header {
            position: fixed; top: 3vh; width: 100%; text-align: center;
            color: var(--brass); text-shadow: 2px 2px 8px #000; z-index: 10;
        }
        #station-display { font-size: 3rem; margin: 0; letter-spacing: 6px; text-transform: uppercase; }
        #date-display { font-size: 1.2rem; letter-spacing: 3px; opacity: 0.9; }

        /* FOOTER: CONTROLS (STAY ON THE SILL) */
        .control-deck { 
            position: fixed; bottom: 5vh; left: 50%;
            transform: translateX(-50%);
            display: flex; gap: 40px; align-items: center; 
            z-index: 20; 
        }
        
        button { 
            background: var(--brass); color: #000; border: 2px solid #000; 
            padding: 15px 35px; font-weight: bold; cursor: pointer; border-radius: 5px; 
            font-family: 'Georgia', serif; text-transform: uppercase;
            box-shadow: 0 4px #8a680e;
        }
        button:active { transform: translateY(4px); box-shadow: none; }
        button:hover { background: #fff; }

    </style>
</head>
<body>

    <div id="main-background"></div>

    <div class="train-car-frame"></div>

    <div class="itinerary-header">
        <h1 id="station-display">Connecting...</h1>
        <div id="date-display">Please Wait</div>
    </div>
    
    <div class="window-viewport">
        <iframe id="smugmug-frame" src=""></iframe>
    </div>

    <div class="control-deck">
        <button onclick="navigate(-1)">PREVIOUS</button>
        <button onclick="handleAudio()">🔊 SOUND</button>
        <button onclick="navigate(1)">NEXT</button>
    </div>

    <audio id="ambient-noise" loop>
        <source src="train_sound.mp3" type="audio/mpeg">
    </audio>

    <script>
        let route = [];
        let cursor = 0;
        const player = document.getElementById('ambient-noise');

        fetch('stations.json').then(r => r.json()).then(data => { 
            route = data; 
            render(); 
        });

        function render() {
            if (!route.length) return;
            const current = route[cursor];
            document.getElementById('station-display').innerText = current.name;
            document.getElementById('date-display').innerText = current.date;
            document.getElementById('main-background').style.backgroundImage = `url('${current.bg}')`;
            document.getElementById('smugmug-frame').src = `https://www.theglovers.com/frame/slideshow?key=${current.key}&autoStart=1&randomize=1&speed=5`;
        }

        function navigate(step) {
            cursor = (cursor + step + route.length) % route.length;
            render();
        }

        function handleAudio() {
            player.paused ? player.play() : player.pause();
        }
    </script>
</body>
</html>
