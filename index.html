<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>The Grand Express</title>
    <style>
        :root { --brass: #d4a017; --mahogany: #2c1e1a; }
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background: #000; font-family: 'Georgia', serif; }

        /* THE SCENERY LAYER */
        #main-background {
            position: fixed; top: 0; left: 0; 
            width: 100vw; height: 100vh;
            background-size: cover; 
            background-position: center;
            background-repeat: no-repeat;
            transition: background-image 3s ease-in-out; 
            z-index: 1;
            background-color: #1a110f; /* Fallback mahogany */
        }

        /* THE TRAIN CAR OVERLAY */
        .train-frame {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            border-left: 8vw solid var(--mahogany);
            border-right: 8vw solid var(--mahogany);
            border-top: 15vh solid var(--mahogany);
            border-bottom: 25vh solid #1a110f;
            box-sizing: border-box; z-index: 5; pointer-events: none;
            box-shadow: inset 0 0 150px #000; /* Deep shadow for depth */
        }

        /* THE WINDOW */
        .window-viewport {
            position: absolute; top: 15vh; left: 8vw; width: 84vw; height: 60vh;
            background: #000; z-index: 2; overflow: hidden;
        }
        iframe { width: 100%; height: 100%; border: none; }

        /* HEADER & DATE */
        .header-display {
            position: fixed; top: 4vh; width: 100%; text-align: center;
            color: var(--brass); text-shadow: 2px 2px 15px #000; z-index: 10;
        }
        #station-display { font-size: 3.5rem; margin: 0; letter-spacing: 10px; text-transform: uppercase; font-weight: bold; }
        #date-display { font-size: 1.4rem; letter-spacing: 4px; opacity: 0.9; margin-top: 8px; }

        /* DASHBOARD BUTTONS */
        .controls { 
            position: fixed; bottom: 8vh; left: 50%;
            transform: translateX(-50%);
            display: flex; gap: 40px; z-index: 20; 
        }
        button { 
            background: var(--brass); color: #000; border: 2px solid #000; 
            padding: 14px 35px; font-weight: bold; cursor: pointer; border-radius: 5px; 
            font-family: 'Georgia', serif; text-transform: uppercase;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }
        button:hover { background: #fff; transform: translateY(-2px); }
    </style>
</head>
<body>

    <div id="main-background"></div>
    <div class="train-frame"></div>

    <div class="header-display">
        <h1 id="station-display">BOARDING...</h1>
        <div id="date-display">CONSULTING THE MANIFEST</div>
    </div>
    
    <div class="window-viewport">
        <iframe id="smugmug-frame" src=""></iframe>
    </div>

    <div class="controls">
        <button onclick="navigate(-1)">PREVIOUS</button>
        <button onclick="handleAudio()">🔊 SOUND</button>
        <button onclick="navigate(1)">NEXT</button>
    </div>

    <audio id="ambient-noise" loop>
        <source src="train_sound.mp3" type="audio/mpeg">
    </audio>

    <script>
        let route = [];
        let cursor = 0;
        let timer;
        const player = document.getElementById('ambient-noise');

        // Fetch the manifest with a unique time tag to beat the cache
        fetch('stations.json?nocache=' + new Date().getTime())
            .then(r => r.json())
            .then(data => { 
                route = data; 
                render(); 
                startTimer();
            });

        function render() {
            if (!route.length) return;
            const current = route[cursor];
            
            // Text Updates
            document.getElementById('station-display').innerText = current.name;
            document.getElementById('date-display').innerText = current.date;
            
            // BACKGROUND SCENERY UPDATE
            const bgElement = document.getElementById('main-background');
            bgElement.style.backgroundImage = "none"; // Clear current
            bgElement.style.backgroundImage = "url('" + current.bg + "')"; // Inject new
            
            // SMUGMUG SLIDESHOW UPDATE
            document.getElementById('smugmug-frame').src = "https://www.theglovers.com/frame/slideshow?key=" + current.key + "&autoStart=1&randomize=1&speed=5";
        }

        function startTimer() {
            if (timer) clearInterval(timer);
            timer = setInterval(() => navigate(1), 30000); // 30 second stops
        }

        function navigate(step) {
            cursor = (cursor + step + route.length) % route.length;
            render();
            startTimer(); // Reset the 30s clock
        }

        function handleAudio() {
            player.paused ? player.play() : player.pause();
        }
    </script>
</body>
</html>
