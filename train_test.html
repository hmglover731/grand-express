<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Grand Express: JSONP ONLY</title>
    <style>
        body { background: #1a1a1a; color: white; font-family: sans-serif; text-align: center; padding: 40px; }
        #gallery { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
        img { width: 100%; height: 200px; object-fit: cover; border: 2px solid #d4a017; border-radius: 10px; }
        button { padding: 20px; font-size: 20px; background: #d4a017; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <h1>FINAL ENGINE TEST (JSONP)</h1>
    <button onclick="triggerJsonpLoad()">CLICK TO LOAD IMAGES</button>
    <div id="status">Waiting for click...</div>
    <div id="gallery"></div>

    <script>
        // FACTUAL CHECK: No 'fetch' or 'arriveAtStation' exists in this script.
        const MY_KEY = 'RbBLZqzrMNpqhXhJnHGFQpPzHDGTzS9h';
        const MY_ALBUM = 't7tB6X';

        function triggerJsonpLoad() {
            document.getElementById('status').innerHTML = "Connecting via Script Tag...";
            
            const script = document.createElement('script');
            // This is the JSONP 'Backdoor'
            script.src = `https://api.smugmug.com/api/v2/album/${MY_ALBUM}!images?APIKey=${MY_KEY}&_jsonp=receiveSmugMugData`;
            document.head.appendChild(script);
        }

        window.receiveSmugMugData = function(data) {
            console.log("Success! Data is here.");
            const gallery = document.getElementById('gallery');
            const images = data.Response.AlbumImage;

            gallery.innerHTML = "";
            images.slice(0, 6).forEach(img => {
                const i = document.createElement('img');
                i.src = img.ArchivedUri || img.Uri;
                gallery.appendChild(i);
            });
            document.getElementById('status').innerHTML = "Images loaded successfully.";
        };
    </script>
</body>
</html>
