<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Grand Express: Station Monitor</title>
    <style>
        /* This makes it look like a sleek train car monitor */
        body { 
            background: #1a1a1a; 
            color: #d4a017; 
            font-family: 'Georgia', serif; 
            text-align: center; 
            padding: 20px; 
        }
        .monitor-frame {
            width: 85%;
            max-width: 800px;
            height: 500px;
            margin: 30px auto;
            border: 8px solid #333;
            border-bottom: 15px solid #222; /* "Shelf" look */
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            background: #000;
            overflow: hidden;
            display: none; 
        }
        iframe { width: 100%; height: 100%; border: none; }
        button { 
            padding: 15px 40px; 
            font-size: 1.2rem; 
            background: #d4a017; 
            color: black;
            border: none;
            font-weight: bold; 
            cursor: pointer; 
            border-radius: 50px;
            transition: 0.3s;
        }
        button:hover { background: #ffcc33; transform: scale(1.05); }
    </style>
</head>
<body>

    <h1>GRAND EXPRESS ITINERARY</h1>
    <p>Now Approaching: <strong>Test Station</strong></p>
    
    <button onclick="document.getElementById('monitor').style.display='block'">VIEW STATION PHOTOS</button>

    <div id="monitor" class="monitor-frame">
        <iframe src="https://www.theglovers.com/frame/slideshow?key=t7tB6X&autoStart=1&captions=0&navigation=0&playButton=0&randomize=1&speed=3&transition=fade"></iframe>
    </div>

    <p style="margin-top:20px; color:#555;"><i>Mechanical Handshake: Confirmed via Custom Domain</i></p>

</body>
</html>
