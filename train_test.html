<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Grand Express: Proxy Engine</title>
    <style>
        body { background: #1a1a1a; color: white; font-family: sans-serif; text-align: center; padding: 40px; }
        #gallery { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-top: 30px; }
        img { width: 100%; height: 250px; object-fit: cover; border-radius: 10px; border: 2px solid #d4a017; background: #222; }
        button { padding: 15px 35px; font-size: 18px; cursor: pointer; background: #d4a017; border: none; font-weight: bold; }
        #status { margin: 20px; color: #888; }
    </style>
</head>
<body>

    <h1>Grand Express: Proxy Test</h1>
    <button onclick="loadWithProxy()">Arrive at Station</button>
    <div id="status">Ready.</div>
    <div id="gallery"></div>

    <script>
        const API_KEY = 'RbBLZqzrMNpqhXhJnHGFQpPzHDGTzS9h';
        const ALBUM = 't7tB6X';

        async function loadWithProxy() {
            const status = document.getElementById('status');
            const gallery = document.getElementById('gallery');
            status.innerHTML = "Crossing the Bridge to SmugMug...";
            gallery.innerHTML = "";

            // We use 'allorigins' - a free, reliable bridge that fixes 'ERR_BLOCKED_BY_ORB'
            const smugmugUrl = `https://api.smugmug.com/api/v2/album/${ALBUM}!images?APIKey=${API_KEY}`;
            const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(smugmugUrl)}`;

            try {
                const response = await fetch(proxyUrl);
                if (!response.ok) throw new Error("Proxy connection failed.");
                
                const wrapper = await response.json();
                const data = JSON.parse(wrapper.contents); // AllOrigins wraps the result in a 'contents' string

                if (data.Response && data.Response.AlbumImage) {
                    const images = data.Response.AlbumImage;
                    images.sort(() => 0.5 - Math.random());
                    
                    images.slice(0, 6).forEach(img => {
                        const i = document.createElement('img');
                        // Factual Fallback: Use the medium sized image
                        i.src = img.ImageSizeMedium || img.ArchivedUri || img.Uri;
                        gallery.appendChild(i);
                    });
                    status.innerHTML = "Arrival Complete!";
                } else {
                    status.innerHTML = "Connected, but no images found.";
                }
            } catch (err) {
                console.error(err);
                status.innerHTML = "Proxy Error. Check console (F12).";
            }
        }
    </script>
</body>
</html>
