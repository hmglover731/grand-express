<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Grand Express: Engine Final</title>
    <style>
        :root { --gold: #d4a017; --bg: #1a1a1a; }
        body { background: var(--bg); color: white; font-family: sans-serif; text-align: center; padding: 40px; }
        #gallery { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-top: 30px; }
        img { width: 100%; height: 250px; object-fit: cover; border-radius: 10px; border: 2px solid #333; }
        button { padding: 15px 35px; font-size: 18px; cursor: pointer; background: var(--gold); border: none; border-radius: 5px; font-weight: bold; }
        #status { margin: 20px; color: #888; }
    </style>
</head>
<body>

    <h1>The Grand Express</h1>
    <p>Station: <strong>t7tB6X</strong></p>

    <button onclick="pullImages()">Arrive at Station</button>
    <div id="status">Ready.</div>
    <div id="gallery"></div>

    <script>
        // FACTUAL CONFIG
        const apiKey = 'RbBLZqzrMNpqhXhJnHGFQpPzHDGTzS9h';
        const albumKey = 't7tB6X';

        function pullImages() {
            const statusDiv = document.getElementById('status');
            statusDiv.textContent = "Loading memories via JSONP...";

            // JSONP bypasses CORS by loading the data as a 'script'
            const oldScript = document.getElementById('smugmug-loader');
            if (oldScript) oldScript.remove();

            const script = document.createElement('script');
            script.id = 'smugmug-loader';
            script.src = `https://api.smugmug.com/api/v2/album/${albumKey}!images?APIKey=${apiKey}&_jsonp=handleResponse`;
            document.head.appendChild(script);
        }

        // This function is triggered automatically by the SmugMug script load
        window.handleResponse = function(data) {
            const galleryDiv = document.getElementById('gallery');
            const statusDiv = document.getElementById('status');

            if (data.Response && data.Response.AlbumImage) {
                const images = data.Response.AlbumImage;
                
                // Shuffle and pick 6
                images.sort(() => 0.5 - Math.random());
                const selected = images.slice(0, 6);

                galleryDiv.innerHTML = "";
                statusDiv.textContent = "Arrival Complete.";

                selected.forEach(img => {
                    const imgTag = document.createElement('img');
                    // SmugMug JSONP usually returns 'ArchivedUri' or 'Uri'
                    imgTag.src = img.ArchivedUri || img.Uri;
                    galleryDiv.appendChild(imgTag);
                });
            } else {
                statusDiv.textContent = "Error: Data received but no images found.";
                console.log("SmugMug Data:", data);
            }
        };
    </script>
</body>
</html>
