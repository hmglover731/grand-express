<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Grand Express: Station Monitor</title>
    <style>
        body { 
            background: #1a1a1a; 
            color: #d4a017; 
            font-family: 'Georgia', serif; 
            text-align: center; 
            padding: 20px; 
        }
        .monitor-frame {
            width: 90%;
            max-width: 900px;
            height: 550px;
            margin: 30px auto;
            border: 8px solid #333;
            border-bottom: 15px solid #222;
            border-radius: 15px;
            background: #000;
            overflow: hidden;
            display: none; 
        }
        iframe { width: 100%; height: 100%; border: none; }
        button { 
            padding: 15px 40px; 
            font-size: 1.2rem; 
            background: #d4a017; 
            color: black;
            border: none;
            font-weight: bold; 
            cursor: pointer; 
            border-radius: 50px;
        }
        #fail-safe { display: none; margin-top: 10px; color: yellow; }
    </style>
</head>
<body>

    <h1>GRAND EXPRESS ITINERARY</h1>
    <p>Station: <strong>t7tB6X</strong></p>
    
    <button onclick="igniteMonitor()">ARRIVE AT STATION</button>

    <div id="monitor" class="monitor-frame">
        <iframe id="itinerary-window" src=""></iframe>
    </div>

    <div id="fail-safe">
        Monitor not loading? <a href="https://www.theglovers.com/frame/slideshow?key=t7tB6X" target="_blank" style="color:yellow;">Click here to open the itinerary manually.</a>
    </div>

    <script>
        function igniteMonitor() {
            const frame = document.getElementById('itinerary-window');
            const monitor = document.getElementById('monitor');
            const failSafe = document.getElementById('fail-safe');
            
            // Setting the URL manually to ensure it refreshes
            frame.src = "https://www.theglovers.com/frame/slideshow?key=t7tB6X&autoStart=1&randomize=1";
            
            monitor.style.display = 'block';
            failSafe.style.display = 'block';
        }
    </script>
</body>
</html>
