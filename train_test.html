<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Grand Express: Universal Engine</title>
    <style>
        body { background: #1a1a1a; color: white; font-family: sans-serif; text-align: center; padding: 40px; }
        #gallery { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-top: 30px; }
        img { width: 100%; height: 250px; object-fit: cover; border-radius: 10px; border: 2px solid #d4a017; background: #222; }
        button { padding: 15px 35px; font-size: 18px; cursor: pointer; background: #d4a017; border: none; font-weight: bold; color: black; border-radius: 5px; }
        #status { margin: 20px; color: #888; }
    </style>
</head>
<body>

    <h1>The Grand Express</h1>
    <button onclick="startEngine()">ARRIVE AT STATION</button>
    <div id="status">Ready for Departure.</div>
    <div id="gallery"></div>

    <script>
        const KEY = 'RbBLZqzrMNpqhXhJnHGFQpPzHDGTzS9h';
        const ALBUM = 't7tB6X';

        // 1. This function sends the request
        function startEngine() {
            document.getElementById('status').innerHTML = "Chugging to SmugMug...";
            
            // Remove any old script tags
            const old = document.getElementById('smug-loader');
            if (old) old.remove();

            const script = document.createElement('script');
            script.id = 'smug-loader';
            // We use the JSONP 'backdoor' which bypasses ALL proxy/bridge needs
            script.src = `https://api.smugmug.com/api/v2/album/${ALBUM}!images?APIKey=${KEY}&_jsonp=renderPhotos`;
            document.head.appendChild(script);
        }

        // 2. This function catches the data automatically
        window.renderPhotos = function(data) {
            const status = document.getElementById('status');
            const gallery = document.getElementById('gallery');
            
            if (data && data.Response && data.Response.AlbumImage) {
                const images = data.Response.AlbumImage;
                gallery.innerHTML = "";
                
                // Shuffle and take 6
                images.sort(() => 0.5 - Math.random()).slice(0, 6).forEach(img => {
                    const i = document.createElement('img');
                    // Directly access the URL SmugMug sent back
                    i.src = img.ArchivedUri || img.Uri;
                    gallery.appendChild(i);
                });
                status.innerHTML = "Arrival Complete! Photos loaded.";
            } else {
                status.innerHTML = "Connected, but no photos found. Check if Album is Public.";
                console.log("Debug Data:", data);
            }
        };
    </script>
</body>
</html>
