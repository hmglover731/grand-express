<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Grand Express: Industrial Engine</title>
    <style>
        body { background: #1a1a1a; color: white; font-family: sans-serif; text-align: center; padding: 40px; }
        #gallery { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-top: 30px; }
        img { width: 100%; height: 200px; object-fit: cover; border: 2px solid #d4a017; border-radius: 10px; }
        button { padding: 20px; font-size: 20px; background: #d4a017; font-weight: bold; cursor: pointer; color: black; border: none; }
        #status { margin: 20px; color: #888; }
    </style>
</head>
<body>

    <h1>Grand Express: Industrial Test</h1>
    <button onclick="loadImages()">ARRIVE AT STATION</button>
    <div id="status">Ready.</div>
    <div id="gallery"></div>

    <script>
        const KEY = 'RbBLZqzrMNpqhXhJnHGFQpPzHDGTzS9h';
        const ALBUM = 't7tB6X';

        async function loadImages() {
            const status = document.getElementById('status');
            const gallery = document.getElementById('gallery');
            status.innerHTML = "Opening the industrial bridge...";
            gallery.innerHTML = "";

            // This is the most powerful bridge available
            const proxy = 'https://cors-anywhere.herokuapp.com/';
            const target = `https://api.smugmug.com/api/v2/album/${ALBUM}!images?APIKey=${KEY}`;

            try {
                const response = await fetch(proxy + target, {
                    headers: { 'X-Requested-With': 'XMLHttpRequest' }
                });

                if (!response.ok) throw new Error("Bridge denied access. Did you click the 'Request Access' link?");

                const data = await response.json();
                const images = data.Response.AlbumImage;

                images.sort(() => 0.5 - Math.random());
                images.slice(0, 6).forEach(img => {
                    const i = document.createElement('img');
                    // We use the direct web link SmugMug provides
                    i.src = img.ArchivedUri || img.Uri;
                    gallery.appendChild(i);
                });
                status.innerHTML = "SUCCESS! The engine is live.";

            } catch (err) {
                console.error(err);
                status.innerHTML = "STOPPED. <br>Please visit <a href='https://cors-anywhere.herokuapp.com/corsdemo' target='_blank' style='color:yellow;'>THIS LINK</a> and click 'Request Access', then try again.";
            }
        }
    </script>
</body>
</html>
