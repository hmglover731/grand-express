<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Grand Express: Final Handshake</title>
    <style>
        body { background: #1a1a1a; color: white; font-family: sans-serif; text-align: center; padding: 40px; }
        #gallery { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-top: 30px; }
        img { width: 100%; height: 200px; object-fit: cover; border: 2px solid #d4a017; border-radius: 10px; background: #222; }
        button { padding: 20px 40px; font-size: 20px; background: #d4a017; font-weight: bold; cursor: pointer; color: black; border: none; border-radius: 8px; }
        #status { margin: 20px; color: #888; font-style: italic; }
    </style>
</head>
<body>

    <h1>The Grand Express</h1>
    <button onclick="igniteEngine()">ARRIVE AT STATION</button>
    <div id="status">Ready for Departure.</div>
    <div id="gallery"></div>

    <script>
        // 1. YOUR ACTUAL DATA
        const KEY = 'RbBLZqzrMNpqhXhJnHGFQpPzHDGTzS9h';
        const ALBUM = 't7tB6X';

        // 2. THE LANDING PAD (Must be defined on 'window' to be visible)
        window.processSmugMugData = function(data) {
            console.log("Mechanical Handshake Success!");
            const gallery = document.getElementById('gallery');
            const status = document.getElementById('status');

            if (data && data.Response && data.Response.AlbumImage) {
                const images = data.Response.AlbumImage;
                gallery.innerHTML = "";
                
                // Shuffle and pick 6
                images.sort(() => 0.5 - Math.random()).slice(0, 6).forEach(img => {
                    const i = document.createElement('img');
                    // SmugMug's direct URL for the image
                    i.src = img.ArchivedUri || img.Uri;
                    gallery.appendChild(i);
                });
                status.innerHTML = "Arrival Complete! The engine is running.";
            } else {
                status.innerHTML = "Connected, but no photos found. Check SmugMug Privacy settings for album t7tB6X.";
            }
        };

        // 3. THE TRIGGER
        function igniteEngine() {
            document.getElementById('status').innerHTML = "Chugging to SmugMug via JSONP...";
            
            // Clean up old scripts
            const old = document.getElementById('smug-loader');
            if (old) old.remove();

            const script = document.createElement('script');
            script.id = 'smug-loader';
            
            // This URL tells SmugMug: "Wrap the data in processSmugMugData()"
            script.src = `https://api.smugmug.com/api/v2/album/${ALBUM}!images?APIKey=${KEY}&_jsonp=processSmugMugData`;
            
            document.head.appendChild(script);
        }
    </script>
</body>
</html>
