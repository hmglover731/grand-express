<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Grand Express: The Final Engine</title>
    <style>
        body { background: #1a1a1a; color: white; font-family: sans-serif; text-align: center; padding: 40px; }
        #gallery { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-top: 30px; }
        img { width: 100%; height: 250px; object-fit: cover; border-radius: 10px; border: 2px solid #d4a017; background: #222; }
        button { padding: 15px 35px; font-size: 18px; cursor: pointer; background: #d4a017; font-weight: bold; color: black; border-radius: 5px; border: none; }
        #status { margin: 20px; color: #888; }
    </style>
</head>
<body>

    <h1>The Grand Express</h1>
    <p>Station: <strong>t7tB6X</strong></p>
    <button onclick="loadStationPhotos()">ARRIVE AT STATION</button>
    <div id="status">Ready.</div>
    <div id="gallery"></div>

    <script>
        const ALBUM_KEY = 't7tB6X';

        async function loadStationPhotos() {
            const status = document.getElementById('status');
            const gallery = document.getElementById('gallery');
            status.innerHTML = "Signal sent... waiting for images.";
            gallery.innerHTML = "";

            // We use the RSS Feed link - this bypasses API keys and CORS/ORB blocks
            const rssUrl = `https://www.smugmug.com/hack/feed.mg?Type=album&Data=${ALBUM_KEY}&format=rss20`;
            
            // We use a public 'RSS to JSON' converter so the browser doesn't freak out
            const proxyUrl = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(rssUrl)}`;

            try {
                const response = await fetch(proxyUrl);
                const data = await response.json();

                if (data.items && data.items.length > 0) {
                    // Randomize and take 6
                    const photos = data.items.sort(() => 0.5 - Math.random()).slice(0, 6);
                    
                    photos.forEach(item => {
                        const img = document.createElement('img');
                        // RSS feeds store the photo link in the 'enclosure' or 'description'
                        img.src = item.enclosure.link || item.guid;
                        gallery.appendChild(img);
                    });
                    status.innerHTML = "Arrival Complete!";
                } else {
                    status.innerHTML = "Connected, but no photos found. Is the album Public?";
                }
            } catch (err) {
                console.error(err);
                status.innerHTML = "System Failure. Please ensure SmugMug album is Public.";
            }
        }
    </script>
</body>
</html>
