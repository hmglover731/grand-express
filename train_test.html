<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Grand Express: The Final Station</title>
    <style>
        body { background: #1a1a1a; color: white; font-family: sans-serif; text-align: center; padding: 40px; }
        .slideshow-container { 
            width: 80%; 
            max-width: 900px; 
            height: 500px; 
            margin: 20px auto; 
            border: 4px solid #d4a017; 
            border-radius: 15px; 
            overflow: hidden; 
            background: #000;
        }
        iframe { width: 100%; height: 100%; border: none; }
        button { padding: 15px 35px; font-size: 18px; cursor: pointer; background: #d4a017; border: none; font-weight: bold; color: black; border-radius: 5px; }
        #status { margin: 10px; color: #888; }
    </style>
</head>
<body>

    <h1>The Grand Express</h1>
    <p>Station: <strong>t7tB6X</strong></p>
    <button onclick="arriveAtStation()">ARRIVE AT STATION</button>
    
    <div id="status">Ready.</div>
    <div id="engine-room" class="slideshow-container" style="display:none;">
        </div>

    <script>
        function arriveAtStation() {
            const status = document.getElementById('status');
            const engineRoom = document.getElementById('engine-room');
            
            status.innerHTML = "Pulling into the station...";
            
            // We use your custom domain here! 
            // We are using the 'Embed' format which SmugMug likes best.
            const albumUrl = "https://theglovers.com/frame/slideshow?key=t7tB6X&autoStart=1&captions=0&navigation=1&playButton=0&randomize=1&speed=3&transition=fade&transitionSpeed=2";
            
            engineRoom.innerHTML = `<iframe src="${albumUrl}"></iframe>`;
            engineRoom.style.display = "block";
            
            status.innerHTML = "Arrival Complete! View the itinerary below.";
        }
    </script>
</body>
</html>
